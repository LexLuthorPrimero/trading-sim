services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - COBOL_DIR=/app/cobol
      - DB_PATH=/app/data/trading.db
      - ALPACA_API_KEY=${ALPACA_API_KEY}
      - ALPACA_SECRET_KEY=${ALPACA_SECRET_KEY}
      - ALPACA_PAPER=true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  dashboard:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./dashboard:/app
      - ./data:/app/data
    ports:
      - "8501:8501"
    environment:
      - DB_PATH=/app/data/trading.db
      - API_URL=http://api:8000
    command: >
      sh -c "pip install --quiet -r requirements.txt && streamlit run app.py --server.port=8501 --server.address=0.0.0.0"
    depends_on:
      api:
        condition: service_healthy
